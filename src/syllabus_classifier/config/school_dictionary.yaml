# Generic patterns that mark a token as a school (not a department):
school_patterns: ["대학교$", "University"]
# Tokens that mark a value as a department — must never be promoted to school:
department_markers: ["학과", "학부", "전공", "대학원", "Department", "Dept", "School of", "College of"]
