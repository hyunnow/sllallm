    canonical: "연세대학교"
    aliases: ["연세대", "Yonsei University", "Yonsei", "YISS"]
    campuses: ["신촌", "국제", "원주"]     # 원주 has different period times (§3-3)
    domains: ['yonsei.ac.kr']
  korea:
    canonical: "고려대학교"
