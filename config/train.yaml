# Model + training hyperparameters (Phase 7).
seed: 42

model:
  # 한/영 혼합 → 다국어/한국어 인코더. 소규모 실험은 klue/roberta-base로 시작,
  # 한영 혼합 강건성은 xlm-roberta-base와 비교.
  encoder: klue/roberta-base       # alt: xlm-roberta-base, klue/bert-base
  max_length: 256
  num_labels: 8

# candidate + where-it-was-found + surrounding text
input_format: "{candidate_text} [SEP] {section_title} / {table_row_label} [SEP] {nearby_text}"

training:
  epochs: 5
  batch_size: 32
  lr: 2.0e-5
  weight_decay: 0.01
  warmup_ratio: 0.1
  # precision > recall: a class_schedule false positive is catastrophic, so make
  # the model conservative about that one class.
  loss: focal                      # focal | weighted_ce | ce
  focal_gamma: 2.0
  class_weights: auto
  # only assign class_schedule above this confidence; when unsure, don't.
  # 2026-07-13 (합성 재학습 후): precision 하한을 0.95로 완화하고 0.50 채택.
  # 근거 — 전체 파이프라인(모델+validator) real holdout(test): precision 0.946 /
  # recall 0.633 / office->class 0.000. 0.80은 precision 0.991이지만 recall 0.438로
  # 절반 이상 놓쳤다(빈 캘린더가 오탐보다 나쁨). validator가 office->class를 임계값과
  # 무관하게 0으로 보장하므로 낮춰도 flagship 제약은 안전. 이 지점의 FP 9는 전부
  # gold=unknown(exam/assignment 누출 0 — scripts/23_fp_breakdown.py로 확인). 모델
  # 바뀌면 재튜닝.
  class_schedule_confidence_threshold: 0.50

eval:
  primary_metric: class_schedule_precision   # target 0.98~0.99+
  report_confusion_matrix: true
