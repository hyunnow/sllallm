# KB 2 — academic calendar: term start + holidays -> resolve Week N to dates.
#
# v7 §3 policy: CURRENT + UPCOMING terms ONLY, top schools only. Past terms
# (2005~2024) are intentionally left empty — in-document dates resolve them for
# free (v7 §2 priority 1) and everything else is needs_review BY DESIGN.
# Keep this file small; refresh it each term, do not backfill history.
#
# CRITICAL invariant: a missing entry means resolved_date stays null +
# needs_review. The resolver NEVER invents a date (SYL-032).
#
# HUMAN TODO: fill term_start/term_end/holidays for the schools you serve,
# for 2026-여름 (current) and 2026-2학기 (upcoming) only.
calendars:
  yonsei__2026_summer:
    term_start: null
    term_end: null
    holidays: []
  yonsei__2026_2:
    term_start: null
    term_end: null
    holidays: []
  hanyang__2026_2:
    term_start: null
    term_end: null
    holidays: []
  korea__2026_2:
    term_start: null
    term_end: null
